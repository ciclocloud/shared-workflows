name: Reusable Release Workflow
on:
  workflow_call:
    secrets:
      DOCKER_TOKEN:
        required: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          # Reemplazar el username por 'TU_USUARIO_DOCKER'
          username: bapp86
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Reemplaza 'TU_USUARIO_DOCKER' en el 'tags' por tu nombre real de Docker Hub
          tags: bapp86/client-app:latest
